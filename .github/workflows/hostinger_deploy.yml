name: Deploy ClassTrack to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: hostinger-prod-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Upload ClassTrack files
    runs-on: ubuntu-latest
    env:
      HOSTINGER_HOST: ${{ secrets.HOSTINGER_HOST }}
      HOSTINGER_PORT: ${{ secrets.HOSTINGER_PORT }}
      HOSTINGER_USER: ${{ secrets.HOSTINGER_USER }}
      HOSTINGER_PATH: ${{ secrets.HOSTINGER_PATH }}
    steps:
      - name: Checkout ClassTrack code
        uses: actions/checkout@v4

      - name: Configure SSH access
        shell: bash
        env:
          HOSTINGER_SSH_PRIVATE_KEY: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}
        run: |
          # Stop the workflow if any command fails
          set -euo pipefail
          : "${HOSTINGER_HOST:?Missing GitHub secret HOSTINGER_HOST}"
          : "${HOSTINGER_PORT:?Missing GitHub secret HOSTINGER_PORT}"
          : "${HOSTINGER_USER:?Missing GitHub secret HOSTINGER_USER}"
          : "${HOSTINGER_PATH:?Missing GitHub secret HOSTINGER_PATH}"
          : "${HOSTINGER_SSH_PRIVATE_KEY:?Missing GitHub secret HOSTINGER_SSH_PRIVATE_KEY}"
          SSH_HOST="$(printf '%s' "$HOSTINGER_HOST" | tr -d '[:space:]')"
          SSH_HOST="${SSH_HOST#ssh://}"
          SSH_HOST="${SSH_HOST#sftp://}"
          SSH_HOST="${SSH_HOST#*@}"
          SSH_HOST="${SSH_HOST%%/*}"
          SSH_HOST="${SSH_HOST%%:*}"
          SSH_PORT="$(printf '%s' "$HOSTINGER_PORT" | tr -d '[:space:]')"
          SSH_USER="$(printf '%s' "$HOSTINGER_USER" | tr -d '[:space:]')"
          SSH_USER="${SSH_USER%@*}"
          SSH_PATH="$(printf '%s' "$HOSTINGER_PATH" | tr -d '[:space:]')"
          if [[ ! "$SSH_PORT" =~ ^[0-9]+$ ]]; then
            echo "HOSTINGER_PORT must be only the port number, for example: 65002"
            exit 1
          fi
          if [[ ! "$SSH_HOST" =~ ^[A-Za-z0-9.-]+$ ]]; then
            echo "HOSTINGER_HOST must be only a hostname or IP address, for example: 147.93.80.66"
            exit 1
          fi
          if [[ -z "$SSH_USER" ]]; then
            echo "HOSTINGER_USER is empty after cleanup"
            exit 1
          fi
          if [[ "$SSH_PATH" != /* ]]; then
            echo "HOSTINGER_PATH must be an absolute path, for example: /home/u260588187/domains/white-dugong-883928.hostingersite.com/public_html"
            exit 1
          fi
          # Create SSH folder used by the runner
          mkdir -p ~/.ssh
          # Write the Hostinger private key from GitHub Secrets into a temporary key file
          printf '%s\n' "$HOSTINGER_SSH_PRIVATE_KEY" > ~/.ssh/hostinger_key
          # Restrict the key permissions to read and write
          chmod 600 ~/.ssh/hostinger_key

      - name: Prepare remote folders
        shell: bash
        run: |
          # Stop the workflow if any command fails
          set -euo pipefail
          SSH_HOST="$(printf '%s' "$HOSTINGER_HOST" | tr -d '[:space:]')"
          SSH_HOST="${SSH_HOST#ssh://}"
          SSH_HOST="${SSH_HOST#sftp://}"
          SSH_HOST="${SSH_HOST#*@}"
          SSH_HOST="${SSH_HOST%%/*}"
          SSH_HOST="${SSH_HOST%%:*}"
          SSH_PORT="$(printf '%s' "$HOSTINGER_PORT" | tr -d '[:space:]')"
          SSH_USER="$(printf '%s' "$HOSTINGER_USER" | tr -d '[:space:]')"
          SSH_USER="${SSH_USER%@*}"
          SSH_PATH="$(printf '%s' "$HOSTINGER_PATH" | tr -d '[:space:]')"
          ssh -i ~/.ssh/hostinger_key -p "$SSH_PORT" -o StrictHostKeyChecking=accept-new "$SSH_USER@$SSH_HOST" "mkdir -p '$SSH_PATH' '$SSH_PATH/uploads/profiles' '$SSH_PATH/uploads/qrcodes'"

      - name: Upload application files
        shell: bash
        run: |
          # Stop the workflow if any command fails
          set -euo pipefail
          SSH_HOST="$(printf '%s' "$HOSTINGER_HOST" | tr -d '[:space:]')"
          SSH_HOST="${SSH_HOST#ssh://}"
          SSH_HOST="${SSH_HOST#sftp://}"
          SSH_HOST="${SSH_HOST#*@}"
          SSH_HOST="${SSH_HOST%%/*}"
          SSH_HOST="${SSH_HOST%%:*}"
          SSH_PORT="$(printf '%s' "$HOSTINGER_PORT" | tr -d '[:space:]')"
          SSH_USER="$(printf '%s' "$HOSTINGER_USER" | tr -d '[:space:]')"
          SSH_USER="${SSH_USER%@*}"
          SSH_PATH="$(printf '%s' "$HOSTINGER_PATH" | tr -d '[:space:]')"
          # Store the SSH command so that RSYNC will be able to connect to Hostinger
          RSYNC_SSH="ssh -i ~/.ssh/hostinger_key -p $SSH_PORT -o StrictHostKeyChecking=accept-new"
          # Build the RSYNC option list
          RSYNC_OPTIONS=(
            # Archive mode
            -a
            # Compression mode
            -z
            # Folders and files below are excluded to be uploaded to Hostinger
            --exclude ".git/"
            --exclude ".github/"
            --exclude ".ssh/"
            --exclude "node_modules/"
            --exclude ".env"
            --exclude ".env.*"
            --exclude ".gitignore"
            --exclude "package-lock.json"
            --exclude "package.json"
          )
          rsync "${RSYNC_OPTIONS[@]}" --rsync-path="mkdir -p '$SSH_PATH' && rsync" -e "$RSYNC_SSH" ./ "$SSH_USER@$SSH_HOST:$SSH_PATH/"

      - name: Create production environment file
        shell: bash
        env:
          APP_ENV: ${{ secrets.APP_ENV }}
          APP_URL: ${{ secrets.APP_URL }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_DATABASE: ${{ secrets.DB_DATABASE }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_CHARSET: ${{ secrets.DB_CHARSET }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_ENCRYPTION: ${{ secrets.SMTP_ENCRYPTION }}
          SMTP_FROM_EMAIL: ${{ secrets.SMTP_FROM_EMAIL }}
          SMTP_FROM_NAME: ${{ secrets.SMTP_FROM_NAME }}
        run: |
          # Stop the workflow if any command fails
          set -euo pipefail
          : "${APP_URL:?Missing GitHub secret APP_URL}"
          : "${DB_HOST:?Missing GitHub secret DB_HOST}"
          : "${DB_DATABASE:?Missing GitHub secret DB_DATABASE}"
          : "${DB_USERNAME:?Missing GitHub secret DB_USERNAME}"
          : "${SMTP_USERNAME:?Missing GitHub secret SMTP_USERNAME}"
          : "${SMTP_PASSWORD:?Missing GitHub secret SMTP_PASSWORD}"
          # Build the production .env from GitHub Secrets. Keep the real .env out of git.
          {
            printf 'APP_ENV=%s\n' "${APP_ENV:-production}"
            printf 'APP_URL=%s\n' "$APP_URL"
            printf 'DB_HOST=%s\n' "$DB_HOST"
            printf 'DB_PORT=%s\n' "${DB_PORT:-3306}"
            printf 'DB_DATABASE=%s\n' "$DB_DATABASE"
            printf 'DB_USERNAME=%s\n' "$DB_USERNAME"
            printf 'DB_PASSWORD="%s"\n' "$DB_PASSWORD"
            printf 'DB_CHARSET=%s\n' "${DB_CHARSET:-utf8mb4}"
            printf 'SMTP_HOST=%s\n' "${SMTP_HOST:-smtp.gmail.com}"
            printf 'SMTP_PORT=%s\n' "${SMTP_PORT:-587}"
            printf 'SMTP_USERNAME=%s\n' "$SMTP_USERNAME"
            printf 'SMTP_PASSWORD="%s"\n' "$SMTP_PASSWORD"
            printf 'SMTP_ENCRYPTION=%s\n' "${SMTP_ENCRYPTION:-tls}"
            printf 'SMTP_FROM_EMAIL=%s\n' "${SMTP_FROM_EMAIL:-$SMTP_USERNAME}"
            printf 'SMTP_FROM_NAME="%s"\n' "${SMTP_FROM_NAME:-ClassTrack}"
          } > .env.deploy
          SSH_HOST="$(printf '%s' "$HOSTINGER_HOST" | tr -d '[:space:]')"
          SSH_HOST="${SSH_HOST#ssh://}"
          SSH_HOST="${SSH_HOST#sftp://}"
          SSH_HOST="${SSH_HOST#*@}"
          SSH_HOST="${SSH_HOST%%/*}"
          SSH_HOST="${SSH_HOST%%:*}"
          SSH_PORT="$(printf '%s' "$HOSTINGER_PORT" | tr -d '[:space:]')"
          SSH_USER="$(printf '%s' "$HOSTINGER_USER" | tr -d '[:space:]')"
          SSH_USER="${SSH_USER%@*}"
          SSH_PATH="$(printf '%s' "$HOSTINGER_PATH" | tr -d '[:space:]')"
          scp -i ~/.ssh/hostinger_key -P "$SSH_PORT" -o StrictHostKeyChecking=accept-new .env.deploy "$SSH_USER@$SSH_HOST:$SSH_PATH/.env"
          rm -f .env.deploy
